<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" fill="none">
  <!-- ═══ SOL ═══ -->
  <g transform="translate(200,60)">
    <!-- Rayos finos -->
    <g stroke="#F5C518" stroke-width="3.5" stroke-linecap="round">
      <line x1="0" y1="-52" x2="0" y2="-68"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(22.5)"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(45)"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(67.5)"/>
      <line x1="0" y1="-52" x2="0" y2="-68" transform="rotate(90)"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(112.5)"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(135)"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(157.5)"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(202.5)"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(225)"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(247.5)"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(292.5)"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(315)"/>
      <line x1="18" y1="-48" x2="24" y2="-62" transform="rotate(337.5)"/>
    </g>
    <!-- Rayos anchos alternos -->
    <g fill="#F5C518">
      <polygon points="0,-68 5,-52 -5,-52" transform="rotate(0)"/>
      <polygon points="0,-68 5,-52 -5,-52" transform="rotate(45)"/>
      <polygon points="0,-68 5,-52 -5,-52" transform="rotate(90)"/>
      <polygon points="0,-68 5,-52 -5,-52" transform="rotate(135)"/>
      <polygon points="0,-68 5,-52 -5,-52" transform="rotate(180)"/>
      <polygon points="0,-68 5,-52 -5,-52" transform="rotate(225)"/>
      <polygon points="0,-68 5,-52 -5,-52" transform="rotate(270)"/>
      <polygon points="0,-68 5,-52 -5,-52" transform="rotate(315)"/>
    </g>
    <!-- Disco solar -->
    <circle r="40" fill="#F5C518"/>
    <circle r="28" fill="#E8A800"/>
  </g>

  <!-- ═══ LAUREL IZQUIERDO ═══ -->
  <g fill="#3A7D2C">
    <ellipse cx="78" cy="170" rx="12" ry="6" transform="rotate(-40,78,170)"/>
    <ellipse cx="66" cy="190" rx="12" ry="6" transform="rotate(-50,66,190)"/>
    <ellipse cx="58" cy="212" rx="12" ry="6" transform="rotate(-55,58,212)"/>
    <ellipse cx="55" cy="235" rx="12" ry="6" transform="rotate(-60,55,235)"/>
    <ellipse cx="56" cy="258" rx="12" ry="6" transform="rotate(-65,56,258)"/>
    <ellipse cx="61" cy="280" rx="12" ry="6" transform="rotate(-60,61,280)"/>
    <ellipse cx="68" cy="300" rx="12" ry="6" transform="rotate(-50,68,300)"/>
    <ellipse cx="79" cy="318" rx="12" ry="6" transform="rotate(-40,79,318)"/>
    <!-- rama -->
    <path d="M100,330 Q68,270 80,155" stroke="#2D5A1F" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ═══ LAUREL DERECHO ═══ -->
  <g fill="#3A7D2C">
    <ellipse cx="322" cy="170" rx="12" ry="6" transform="rotate(40,322,170)"/>
    <ellipse cx="334" cy="190" rx="12" ry="6" transform="rotate(50,334,190)"/>
    <ellipse cx="342" cy="212" rx="12" ry="6" transform="rotate(55,342,212)"/>
    <ellipse cx="345" cy="235" rx="12" ry="6" transform="rotate(60,345,235)"/>
    <ellipse cx="344" cy="258" rx="12" ry="6" transform="rotate(65,344,258)"/>
    <ellipse cx="339" cy="280" rx="12" ry="6" transform="rotate(60,339,280)"/>
    <ellipse cx="332" cy="300" rx="12" ry="6" transform="rotate(50,332,300)"/>
    <ellipse cx="321" cy="318" rx="12" ry="6" transform="rotate(40,321,318)"/>
    <!-- rama -->
    <path d="M300,330 Q332,270 320,155" stroke="#2D5A1F" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ═══ LAZO CELESTE ═══ -->
  <g transform="translate(200,368)">
    <!-- Ala izquierda -->
    <path d="M-60,-10 C-90,-30 -80,10 -45,5 C-70,-2 -65,-20 -40,-5 Z" fill="#75AADB"/>
    <!-- Ala derecha -->
    <path d="M60,-10 C90,-30 80,10 45,5 C70,-2 65,-20 40,-5 Z" fill="#75AADB"/>
    <!-- Centro del lazo -->
    <ellipse cx="0" cy="-3" rx="18" ry="12" fill="#4f8fbf"/>
    <!-- Cinta colgando izquierda -->
    <path d="M-20,5 Q-35,30 -30,55" stroke="#75AADB" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Cinta colgando derecha -->
    <path d="M20,5 Q35,30 30,55" stroke="#75AADB" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Rayas blancas en cintas -->
    <path d="M-20,5 Q-35,30 -30,55" stroke="white" stroke-width="3" stroke-dasharray="4,7" fill="none" opacity="0.6"/>
    <path d="M20,5 Q35,30 30,55" stroke="white" stroke-width="3" stroke-dasharray="4,7" fill="none" opacity="0.6"/>
  </g>

  <!-- ═══ ESCUDO OVAL – BORDE ═══ -->
  <ellipse cx="200" cy="230" rx="118" ry="148" fill="white" stroke="#CCCCCC" stroke-width="2"/>

  <!-- ═══ CAMPO CELESTE (mitad superior) ═══ -->
  <clipPath id="escudo-clip">
    <ellipse cx="200" cy="230" rx="114" ry="144"/>
  </clipPath>
  <g clip-path="url(#escudo-clip)">
    <!-- Fondo celeste superior -->
    <rect x="86" y="86" width="228" height="144" fill="#75AADB"/>
    <!-- Fondo blanco inferior -->
    <rect x="86" y="230" width="228" height="144" fill="#FFFFFF"/>
    <!-- Franja roja espejada -->
    <path d="M86,358 Q200,330 314,358 Q314,374 200,374 Q86,374 86,358Z" fill="#E8351E" opacity="0.7"/>

    <!-- ─ LLAMAS ─ -->
    <g transform="translate(200,320)">
      <ellipse cx="-25" cy="0" rx="10" ry="22" fill="#FF6B15" transform="rotate(-15)"/>
      <ellipse cx="0" cy="-5" rx="12" ry="26" fill="#FF4500"/>
      <ellipse cx="25" cy="0" rx="10" ry="22" fill="#FF6B15" transform="rotate(15)"/>
      <ellipse cx="-12" cy="2" rx="6" ry="14" fill="#FFD700" opacity="0.8"/>
      <ellipse cx="12" cy="2" rx="6" ry="14" fill="#FFD700" opacity="0.8"/>
    </g>

    <!-- ─ CRUZ ─ -->
    <g transform="translate(200,312)">
      <rect x="-4" y="-28" width="8" height="42" fill="#5C2D0A" rx="1"/>
      <rect x="-14" y="-18" width="28" height="7" fill="#5C2D0A" rx="1"/>
    </g>

    <!-- ─ MANOS (apretón) ─ -->
    <g transform="translate(200,240)">
      <!-- Mano izquierda -->
      <path d="M-80,0 C-70,-18 -40,-18 -30,-2 C-20,8 -10,10 5,8 L5,22 C-8,24 -22,22 -34,12 C-45,24 -72,22 -80,10 Z" fill="#C8860A"/>
      <!-- Muñeca izquierda -->
      <rect x="-114" y="-8" width="38" height="28" rx="6" fill="#D4930D"/>
      <!-- Mano derecha -->
      <path d="M80,0 C70,-18 40,-18 30,-2 C20,8 10,10 -5,8 L-5,22 C8,24 22,22 34,12 C45,24 72,22 80,10 Z" fill="#C8860A"/>
      <!-- Muñeca derecha -->
      <rect x="76" y="-8" width="38" height="28" rx="6" fill="#D4930D"/>
    </g>

    <!-- ─ GORRO FRIGIO ─ -->
    <g transform="translate(200,128)">
      <!-- Palo/lanza -->
      <rect x="-3" y="-18" width="6" height="56" fill="#5C2D0A" rx="1"/>
      <!-- Gorro -->
      <path d="M0,-60 C-8,-40 -22,-20 -22,0 C-22,14 -8,22 0,22 C8,22 22,14 22,0 C22,-20 8,-40 0,-60 Z" fill="#CC2200"/>
      <!-- Doblez del gorro (parte delantera) -->
      <path d="M-22,0 C-18,-8 -8,-14 0,-14 C8,-14 18,-8 22,0 C18,8 8,14 0,14 C-8,14 -18,8 -22,0 Z" fill="#A81A00"/>
      <!-- Punta del gorro cayendo a la derecha -->
      <path d="M0,-60 Q20,-50 26,-30 Q10,-20 8,-10 Q2,-30 0,-60 Z" fill="#A81A00"/>
    </g>
  </g>

  <!-- Borde del escudo sobre todo -->
  <ellipse cx="200" cy="230" rx="114" ry="144" fill="none" stroke="#AAAAAA" stroke-width="3"/>
  <!-- Borde exterior decorativo -->
  <ellipse cx="200" cy="230" rx="118" ry="148" fill="none" stroke="#DDDDDD" stroke-width="2"/>
</svg>
